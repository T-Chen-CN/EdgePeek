name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EdgePeek\EdgePeek.csproj

      - name: Build
        run: dotnet build EdgePeek\EdgePeek.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet run --project EdgePeek.Tests\EdgePeek.Tests.csproj --configuration Release
